<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#667eea"/>
      <stop offset="50%"  stop-color="#764ba2"/>
      <stop offset="100%" stop-color="#f093fb"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><circle cx="200" cy="200" r="183"/></clipPath>
  </defs>

  <!-- Glowing border ring -->
  <circle cx="200" cy="200" r="196" fill="url(#borderGrad)" filter="url(#glow)"/>

  <!-- Dark editor background -->
  <circle cx="200" cy="200" r="183" fill="url(#bgGrad)"/>

  <!-- Editor top bar -->
  <rect x="17" y="17" width="366" height="32" rx="0" fill="#21262d" clip-path="url(#clip)"/>
  <!-- Traffic lights -->
  <circle cx="48"  cy="33" r="7" fill="#ff5f57"/>
  <circle cx="72"  cy="33" r="7" fill="#febc2e"/>
  <circle cx="96"  cy="33" r="7" fill="#28c840"/>
  <!-- Filename tab -->
  <rect x="120" y="20" width="100" height="26" rx="4" fill="#0d1117"/>
  <text x="170" y="37" font-family="'Courier New', monospace" font-size="11"
        fill="#8b949e" text-anchor="middle">miryam.py</text>

  <!-- Line numbers -->
  <text x="42" y="98"  font-family="'Courier New', monospace" font-size="16" fill="#30363d" text-anchor="middle">1</text>
  <text x="42" y="138" font-family="'Courier New', monospace" font-size="16" fill="#30363d" text-anchor="middle">2</text>
  <text x="42" y="178" font-family="'Courier New', monospace" font-size="16" fill="#30363d" text-anchor="middle">3</text>
  <text x="42" y="218" font-family="'Courier New', monospace" font-size="16" fill="#30363d" text-anchor="middle">4</text>
  <text x="42" y="258" font-family="'Courier New', monospace" font-size="16" fill="#30363d" text-anchor="middle">5</text>
  <text x="42" y="298" font-family="'Courier New', monospace" font-size="16" fill="#30363d" text-anchor="middle">6</text>
  <text x="42" y="338" font-family="'Courier New', monospace" font-size="16" fill="#30363d" text-anchor="middle">7</text>

  <!-- Active line highlight -->
  <rect x="17" y="220" width="366" height="26" fill="#1f2937" opacity="0.6" clip-path="url(#clip)"/>

  <!-- Code line 1: keyword + name -->
  <text x="68" y="98" font-family="'Courier New', monospace" font-size="16" fill="#ff7b72" filter="url(#softGlow)">class</text>
  <text x="125" y="98" font-family="'Courier New', monospace" font-size="16" fill="#d2a8ff" filter="url(#softGlow)">Miryam</text>
  <text x="218" y="98" font-family="'Courier New', monospace" font-size="16" fill="#f0f6fc">:</text>

  <!-- Code line 2: def -->
  <text x="68"  y="138" font-family="'Courier New', monospace" font-size="16" fill="#8b949e">  </text>
  <text x="84"  y="138" font-family="'Courier New', monospace" font-size="16" fill="#ff7b72" filter="url(#softGlow)">def</text>
  <text x="118" y="138" font-family="'Courier New', monospace" font-size="16" fill="#79c0ff" filter="url(#softGlow)"> role</text>
  <text x="178" y="138" font-family="'Courier New', monospace" font-size="16" fill="#f0f6fc">(self):</text>

  <!-- Code line 3: return string -->
  <text x="68"  y="178" font-family="'Courier New', monospace" font-size="16" fill="#ff7b72" filter="url(#softGlow)">    return</text>
  <text x="162" y="178" font-family="'Courier New', monospace" font-size="16" fill="#a5d6ff"> "Full-Stack</text>

  <!-- Code line 4: continued string (active line) -->
  <text x="68"  y="218" font-family="'Courier New', monospace" font-size="16" fill="#a5d6ff" filter="url(#softGlow)">           Developer"</text>

  <!-- Code line 5: blank -->

  <!-- Code line 6: comment -->
  <text x="68" y="258" font-family="'Courier New', monospace" font-size="15" fill="#8b949e"># Python · React · AI</text>

  <!-- Code line 7: result -->
  <text x="68" y="298" font-family="'Courier New', monospace" font-size="16" fill="#3fb950" filter="url(#softGlow)">&gt;&gt;&gt; </text>
  <text x="108" y="298" font-family="'Courier New', monospace" font-size="16" fill="#f0f6fc">Miryam().role()</text>

  <!-- Output line -->
  <text x="68" y="338" font-family="'Courier New', monospace" font-size="16" fill="#f093fb" filter="url(#softGlow)">'Full-Stack Developer'</text>

  <!-- Blinking cursor -->
  <rect x="318" y="322" width="10" height="20" fill="#764ba2" opacity="0.9"/>
</svg>
