<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#764ba2" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Shine overlay -->
  <ellipse cx="160" cy="130" rx="130" ry="90" fill="url(#shine)" opacity="0.6"/>

  <!-- Star of David (two triangles) -->
  <!-- Triangle pointing up -->
  <polygon points="200,85 255,175 145,175"
           fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="3"/>
  <!-- Triangle pointing down -->
  <polygon points="200,315 145,225 255,225"
           fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="3"/>

  <!-- Initials MS -->
  <text x="200" y="186"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="72"
        font-weight="bold"
        fill="white"
        text-anchor="middle"
        dominant-baseline="middle"
        opacity="0.95">M</text>
  <text x="200" y="262"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="72"
        font-weight="bold"
        fill="white"
        text-anchor="middle"
        dominant-baseline="middle"
        opacity="0.95">S</text>

  <!-- Thin border ring -->
  <circle cx="200" cy="200" r="192" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
</svg>
